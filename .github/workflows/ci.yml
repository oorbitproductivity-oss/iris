name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        node: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Run smoke test
        run: npm test
        env:
          # Smoke test runs without a real claude CLI on CI — guard with this env
          # var so the test can skip steps that require live API access.
          IRIS_CI: "1"
