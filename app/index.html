<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- img-src extended to allow the favicon endpoint used by rich web-result
         cards (see app/css/web-cards.css + app/js/lib/markdown.js). Restricted
         to the s2 favicon service only; no other Google subdomains. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: https://www.google.com; font-src 'self' data:;" />
    <title>Iris Code</title>
    <link rel="icon" type="image/png" href="assets/iris-icon.png" />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/chat.css" />
    <link rel="stylesheet" href="css/features.css" />
    <link rel="stylesheet" href="css/themes.css" />
    <link rel="stylesheet" href="css/features-v3.css" />
    <link rel="stylesheet" href="css/features-v3-b.css" />
    <link rel="stylesheet" href="css/mcp.css" />
    <link rel="stylesheet" href="css/browser-pane.css" />
    <link rel="stylesheet" href="css/terminal-pane.css" />
    <link rel="stylesheet" href="css/web-cards.css" />
  </head>
  <body>
    <div id="titlebar">
      <div class="tb-drag">
        <div class="tb-brand">
          <div class="tb-brand-mark" aria-hidden="true">
            <img src="assets/iris-icon.png" alt="" width="18" height="18" />
          </div>
          <span class="tb-brand-name">Iris Code</span>
        </div>
      </div>
      <div class="tb-controls" id="window-controls">
        <button class="tb-ctrl tb-ctrl-min" data-act="min" aria-label="Minimize window" title="Minimize">
          <svg viewBox="0 0 14 14" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"><path d="M3 8 H11"/></svg>
        </button>
        <button class="tb-ctrl tb-ctrl-max" data-act="max" aria-label="Maximize window" title="Maximize">
          <svg viewBox="0 0 14 14" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5"/></svg>
        </button>
        <button class="tb-ctrl tb-ctrl-close" data-act="close" aria-label="Close window" title="Close">
          <svg viewBox="0 0 14 14" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"><path d="M4 4 L10 10 M10 4 L4 10"/></svg>
        </button>
      </div>
    </div>
    <div id="app">
      <aside id="sidebar"></aside>
      <main id="main"></main>
    </div>
    <div id="modal-root"></div>

    <!-- Embedded Iris chat overlay (lives inside the main window) -->
    <div id="iris-overlay" hidden>
      <div class="iro-backdrop" id="iro-backdrop"></div>
      <div class="iro-panel" role="dialog" aria-modal="true" aria-label="Iris chat">
        <div class="iro-header">
          <div class="iro-brand">
            <div class="iro-mark" aria-hidden="true">
              <img src="assets/iris-icon.png" alt="" width="22" height="22" />
            </div>
            <div class="iro-brand-text">
              <div class="iro-brand-name">Iris</div>
              <div class="iro-brand-sub" id="iro-status">Orchestrator</div>
            </div>
          </div>
          <button class="iro-close" id="iro-close" type="button" title="Close (Esc)" aria-label="Close Iris">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3 L13 13 M13 3 L3 13"/>
            </svg>
          </button>
        </div>

        <div class="iro-thread" id="iro-thread">
          <div class="iro-thread-inner" id="iro-thread-inner">
            <div class="iro-welcome" id="iro-welcome">
              <div class="iro-welcome-mark">
                <img src="assets/iris-icon.png" alt="" width="64" height="64" />
              </div>
              <h2 class="iro-welcome-title"><span class="grad">Iris</span> &mdash; your orchestrator</h2>
              <p class="iro-welcome-sub">Ask me to spin up agents, check on workers, or pull a quick answer. I&#39;ll suggest the next action and you click to confirm.</p>
              <div class="iro-suggest">
                <button class="iro-pill" type="button" data-q="What can you do?">What can you do?</button>
                <button class="iro-pill" type="button" data-q="Show me my running agents">Show me my running agents</button>
                <button class="iro-pill" type="button" data-q="Start an agent in a new project">Start an agent in a new project</button>
                <button class="iro-pill" type="button" data-q="Summarize what&#39;s happening">Summarize what&#39;s happening</button>
              </div>
            </div>
          </div>
        </div>

        <div class="iro-composer-wrap">
          <div class="iro-composer">
            <textarea
              id="iro-input"
              class="iro-input"
              rows="1"
              spellcheck="false"
              autocomplete="off"
              placeholder="Ask Iris anything..."
              aria-label="Ask Iris"
            ></textarea>
            <button id="iro-send" class="iro-send" type="button" title="Send (Enter)" aria-label="Send">
              <svg class="iro-send-icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2.5 8h10.5M9 4l4 4-4 4"/>
              </svg>
              <svg class="iro-stop-icon" viewBox="0 0 16 16" width="12" height="12" fill="currentColor" aria-hidden="true">
                <rect x="3" y="3" width="10" height="10" rx="1.5"/>
              </svg>
            </button>
          </div>
          <div class="iro-foot">
            <span><kbd>Esc</kbd> close</span>
            <span><kbd>&#x21B5;</kbd> send</span>
            <span><kbd>Shift</kbd>+<kbd>&#x21B5;</kbd> newline</span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
